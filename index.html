<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="body">
    <h2>Rock Paper Scissors</h2>
    <button class="btn" onclick="
    PickComputerMove(); 
    checkarR(CompPick);
    scorecard.innerText =`Wins : ${score.wins}, Losses : ${score.loss}, Ties : ${score.tie}`;
    "><img class="img-panel" src="IMAGES/Rock-emoji.png"></button>
    <button class="btn" onclick="
    PickComputerMove();
    checkarP(CompPick);
    scorecard.innerText =`Wins : ${score.wins}, Losses : ${score.loss}, Ties : ${score.tie}`;
    "><img class="img-panel" src="IMAGES/Paper-emoji.png" alt=""></button>
    <button class="btn" onclick="
    PickComputerMove();
    checkarS(CompPick);
    scorecard.innerText =`Wins : ${score.wins}, Losses : ${score.loss}, Ties : ${score.tie}`;
    "><img class="img-panel" src="IMAGES/Scissors-emoji.png" alt=""></button>
    <p class = "js-result css-result"></p>
    <p class ="js-ShowPick"></p>
    <p class="js-scorecard"></p>
    <button class="css-reset" onclick="
    localStorage.removeItem('score');
    score.wins = 0;
    score.loss = 0; 
    score.tie = 0; 
    show.innerText = '';
    result.innerText = 'Score Reseted.';
    scorecard.innerText =`Wins : ${score.wins}, Losses : ${score.loss}, Ties : ${score.tie}`;
    ">Reset Button  
    </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
